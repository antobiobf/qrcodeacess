<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bipagem de QR Codes - Controle de Acesso</title>

  <!--
    ALTER TABLE PARA DATA/HORA DO ACESSO

    alter table public.access_codes
    add column if not exists accessed_at timestamptz;

    alter table public.access_codes
    add column if not exists accessed boolean default false;

    alter table public.access_codes
    add column if not exists event_id uuid references public.events(id);
  -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 34%),
        radial-gradient(circle at bottom right, rgba(22, 163, 74, 0.10), transparent 30%),
        #f3f4f6;
      color: #111827;
      padding: 20px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 58%, #2563eb 100%);
      color: white;
      padding: 34px;
      border-radius: 28px;
      margin-bottom: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22);
      text-align: left;
    }

    .header::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      top: -120px;
      right: -90px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .header::after {
      content: '';
      position: absolute;
      width: 360px;
      height: 360px;
      bottom: -220px;
      left: 30%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
    }

    .header-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 9px 14px;
      color: #dbeafe;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1;
      letter-spacing: -1.7px;
      margin-bottom: 14px;
      padding: 0;
    }

    .header p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 17px;
      line-height: 1.5;
      max-width: 680px;
      padding: 0;
    }

    .header-menu {
      position: relative;
      top: auto;
      right: auto;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-self: end;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.10);
    }

    .config-menu-button {
      height: 54px;
      width: auto;
      min-width: 58px;
      background: transparent;
      border: none;
      color: white;
      padding: 0 18px;
      border-radius: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: none;
      white-space: nowrap;
    }

    .config-menu-button::after {
      content: 'Configurações';
      font-size: 14px;
      font-weight: 800;
    }

    .config-menu-button:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
      border: 1px solid rgba(226, 232, 240, 0.92);
    }

    .event-box {
      display: none;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
    }

    .event-box::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 999px;
      right: -55px;
      top: -55px;
      background: rgba(37, 99, 235, 0.08);
    }

    .event-box.active {
      display: block;
    }

    .event-box h2 {
      position: relative;
      z-index: 2;
      font-size: 24px;
      margin-bottom: 10px;
      color: #0f172a;
      letter-spacing: -0.7px;
    }

    .event-box p {
      position: relative;
      z-index: 2;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 4px;
      color: #475569;
      font-weight: 700;
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 800;
      font-size: 14px;
      color: #111827;
    }

    input {
      width: 100%;
      padding: 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      background: white;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .code-card {
      background: linear-gradient(135deg, #ffffff, #f8fafc);
    }

    .code-input {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: .6px;
      background: #f8fafc;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
      transform: translateY(-1px);
    }

    .btn-danger {
      background: #dc2626;
      color: white;
      box-shadow: 0 10px 24px rgba(220, 38, 38, 0.18);
    }

    .btn-danger:hover {
      background: #b91c1c;
      transform: translateY(-1px);
    }

    .camera-card h2 {
      font-size: 24px;
      color: #0f172a;
      margin-bottom: 14px;
      letter-spacing: -0.6px;
    }

    .reader-shell {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 12px;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: #111827;
      border: 1px solid rgba(255, 255, 255, .12);
      min-height: 280px;
    }

    .reader-shell::after {
      content: '';
      pointer-events: none;
      position: absolute;
      inset: 28px;
      border: 2px solid rgba(34, 197, 94, 0.55);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.18);
    }

    .message {
      display: none;
      padding: 16px;
      border-radius: 16px;
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 800;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.warning {
      display: block;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .message.info {
      display: block;
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .result-card {
      display: none;
      border-radius: 22px;
      padding: 20px;
      margin-top: 18px;
      border: 2px solid #e5e7eb;
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
    }

    .result-card.active {
      display: block;
    }

    .result-card.used {
      background: linear-gradient(135deg, #fef2f2, #ffffff);
      border-color: #dc2626;
    }

    .result-card.available {
      background: linear-gradient(135deg, #f0fdf4, #ffffff);
      border-color: #16a34a;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-row span:first-child {
      color: #64748b;
      font-weight: 800;
    }

    .result-row span:last-child {
      font-weight: 900;
      text-align: right;
      color: #0f172a;
    }

    .big-status {
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .big-status.used {
      background: #dc2626;
      color: white;
      box-shadow: 0 14px 30px rgba(220, 38, 38, 0.20);
    }

    .big-status.available {
      background: #16a34a;
      color: white;
      box-shadow: 0 14px 30px rgba(22, 163, 74, 0.20);
    }

    .small-text {
      font-size: 13px;
      color: #64748b;
      line-height: 1.45;
      margin-top: 12px;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .container {
        max-width: 100%;
      }

      .header {
        padding: 24px;
        border-radius: 24px;
      }

      .header-inner {
        grid-template-columns: 1fr;
      }

      .header-menu {
        justify-self: start;
        order: -1;
      }

      .header h1 {
        font-size: 34px;
        text-align: left;
      }

      .header p {
        font-size: 16px;
        text-align: left;
      }

      .config-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 18px;
      }

      button {
        width: 100%;
      }

      .config-menu-button::after {
        display: inline;
      }

      .result-row {
        flex-direction: column;
        gap: 5px;
      }

      .result-row span:last-child {
        text-align: left;
      }

      #reader {
        min-height: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-inner">
        <div class="header-content">
          <span class="header-badge">📲 Portaria inteligente</span>
          <h1>Bipagem de QR Codes</h1>
          <p>Leia o QR Code pela câmera ou digite o código do ingresso para validar a entrada com segurança.</p>
        </div>

        <div class="header-menu">
          <button class="config-menu-button" onclick="toggleConfig()" title="Configurações">⚙️</button>
        </div>
      </div>
    </div>

    <div class="card event-box" id="eventBox">
      <h2 id="eventTitle">Evento não carregado</h2>
      <p id="eventDetails"></p>
    </div>

    <div class="card" id="configContainer" style="display:none;">
      <div class="config-grid">
        <div class="form-group">
          <label for="supabaseUrl">Supabase URL</label>
          <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co" />
        </div>

        <div class="form-group">
          <label for="supabaseKey">Supabase Anon Key</label>
          <input type="password" id="supabaseKey" placeholder="Cole sua anon public key" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="saveSupabaseConfig()">Conectar Supabase</button>
      </div>
    </div>

    <div class="card camera-card">
      <h2>Câmera</h2>
      <div class="reader-shell">
        <div id="reader"></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="startCameraButton" onclick="startCamera()">Abrir câmera</button>
        <button class="btn-danger" onclick="stopCamera()">Parar câmera</button>
      </div>

      <p class="small-text">No celular, permita o acesso à câmera quando o navegador solicitar.</p>
    </div>

    <div class="card code-card">
      <div class="form-group">
        <label for="codeInput">Código do QR Code</label>
        <input class="code-input" type="text" id="codeInput" placeholder="Digite ou leia o código" autocomplete="off" />
      </div>

      <div class="actions">
        <button class="btn-primary" id="searchButton" onclick="searchCode(false)">Pesquisar código</button>
        <button class="btn-secondary" onclick="clearScreen()">Limpar</button>
      </div>

      <div id="message" class="message"></div>
      <div id="resultCard" class="result-card"></div>
    </div>


  </div>

  <script>
    let supabaseClient = null;
    let html5QrCode = null;
    let cameraRunning = false;
    let lastScannedCode = '';
    let lastScanTime = 0;
    let processingScan = false;
    let confirmationOpen = false;
    let currentEventId = null;
    let currentEventData = null;

    const params = new URLSearchParams(window.location.search);
    currentEventId = params.get('event_id');

    const savedUrl = localStorage.getItem('supabase_url') || 'https://pfyctxoikdrephjogdtm.supabase.co';
    const savedKey = localStorage.getItem('supabase_key') || 'sb_publishable_h_5hK_HTT-XJ4WUoOGzkGg_tqkBDLjv';

    document.getElementById('supabaseUrl').value = savedUrl;
    document.getElementById('supabaseKey').value = savedKey;

    initializePage();

    document.getElementById('codeInput').addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        searchCode(false);
      }
    });

    async function initializePage() {
      if (savedUrl && savedKey) {
        connectSupabase(savedUrl, savedKey);

        if (!currentEventId) {
          showMessage('Supabase conectado, mas nenhum event_id foi informado na URL.', 'error');
          return;
        }

        const eventLoaded = await loadEventFromURL();

        if (eventLoaded) {
          showMessage('Supabase conectado. Pronto para bipar este evento.', 'success');
        }
      } else {
        showMessage('Informe os dados do Supabase para começar.', 'info');
      }
    }

    function goHome() {
      window.location.href = '/qrcode/eventos/';
    }

    function toggleConfig() {
      const container = document.getElementById('configContainer');
      container.style.display = container.style.display === 'none' ? 'block' : 'none';
    }

    function connectSupabase(url, key) {
      const { createClient } = supabase;
      supabaseClient = createClient(url, key);
    }

    async function saveSupabaseConfig() {
      const url = document.getElementById('supabaseUrl').value.trim().replace('/rest/v1/', '').replace('/rest/v1', '');
      const key = document.getElementById('supabaseKey').value.trim();

      if (!url || !key) {
        showMessage('Informe a URL e a Anon Key do Supabase.', 'error');
        return;
      }

      localStorage.setItem('supabase_url', url);
      localStorage.setItem('supabase_key', key);
      connectSupabase(url, key);
      showMessage('Supabase conectado com sucesso.', 'success');

      if (currentEventId) {
        await loadEventFromURL();
      }
    }

    async function loadEventFromURL() {
      if (!currentEventId || !supabaseClient) return false;

      const { data, error } = await supabaseClient
        .from('events')
        .select('id, name, event_date, event_time, location')
        .eq('id', currentEventId)
        .maybeSingle();

      if (error) {
        showMessage('Erro ao carregar evento: ' + error.message, 'error');
        return false;
      }

      if (!data) {
        showMessage('Evento não encontrado para este ID.', 'error');
        return false;
      }

      currentEventData = data;

      const eventBox = document.getElementById('eventBox');
      const eventTitle = document.getElementById('eventTitle');
      const eventDetails = document.getElementById('eventDetails');

      eventBox.classList.add('active');
      eventTitle.textContent = data.name || 'Evento';
      eventDetails.textContent = `${formatDateBR(data.event_date) || '-'} • ${formatTime(data.event_time) || '-'} • ${data.location || '-'}`;

      return true;
    }

    async function startCamera() {
      if (cameraRunning) return;

      if (!currentEventId) {
        showMessage('Evento não informado na URL. Use /qrcode/acesso/?event_id=ID_DO_EVENTO.', 'error');
        return;
      }

      try {
        html5QrCode = new Html5Qrcode('reader');

        await html5QrCode.start(
          { facingMode: 'environment' },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 }
          },
          async decodedText => {
            const now = Date.now();

            if (processingScan || confirmationOpen) return;

            if (decodedText === lastScannedCode && now - lastScanTime < 3000) {
              return;
            }

            processingScan = true;
            lastScannedCode = decodedText;
            lastScanTime = now;

            document.getElementById('codeInput').value = decodedText;
            await searchCode(true);
          }
        );

        cameraRunning = true;
        showMessage('Câmera aberta. Aponte para o QR Code deste evento.', 'info');
      } catch (error) {
        showMessage('Erro ao abrir a câmera: ' + error.message, 'error');
      }
    }

    async function stopCamera() {
      if (!html5QrCode || !cameraRunning) return;

      try {
        await html5QrCode.stop();
        html5QrCode.clear();
        cameraRunning = false;
        showMessage('Câmera parada.', 'info');
      } catch (error) {
        showMessage('Erro ao parar a câmera: ' + error.message, 'error');
      }
    }

    async function searchCode(fromCamera = false) {
      if (!supabaseClient) {
        showMessage('Conecte o Supabase primeiro.', 'error');
        releaseScanner();
        return;
      }

      if (!currentEventId) {
        showMessage('Evento não informado na URL. Use /qrcode/acesso/?event_id=ID_DO_EVENTO.', 'error');
        releaseScanner();
        return;
      }

      const code = document.getElementById('codeInput').value.trim();
      const searchButton = document.getElementById('searchButton');

      if (!code) {
        showMessage('Informe ou leia um código.', 'error');
        releaseScanner();
        return;
      }

      searchButton.disabled = true;
      searchButton.textContent = 'Pesquisando...';

      const { data, error } = await supabaseClient
        .from('access_codes')
        .select(`
          *,
          events (
            id,
            name,
            event_date,
            event_time,
            location
          )
        `)
        .eq('qr_code', code)
        .maybeSingle();

      searchButton.disabled = false;
      searchButton.textContent = 'Pesquisar código';

      if (error) {
        showMessage('Erro ao pesquisar código: ' + error.message, 'error');
        releaseScanner();
        return;
      }

      if (!data) {
        renderResult(null, 'invalid');
        showMessage('QR Code inválido. Código não encontrado na base.', 'error');
        releaseScanner();
        return;
      }

      if (data.event_id !== currentEventId) {
        renderResult(null, 'invalid');
        showMessage('QR Code válido, mas pertence a outro evento.', 'error');
        releaseScanner();
        return;
      }

      if (data.accessed === true) {
        renderResult(data, 'used');
        showMessage('Este QR Code já foi utilizado.', 'warning');
        releaseScanner();
        return;
      }

      confirmationOpen = true;
      processingScan = true;

      const confirmAccess = confirm(`Confirmar acesso?\n\n${buildAccessDetails(data, false)}`);

      if (confirmAccess) {
        await confirmAccessCode(data);
      } else {
        showMessage('Acesso não confirmado.', 'info');
        clearResultOnly();
        document.getElementById('codeInput').value = '';
      }

      confirmationOpen = false;
      releaseScanner();
    }

    async function confirmAccessCode(item) {
      const now = new Date().toISOString();

      if (item.event_id !== currentEventId) {
        showMessage('Este QR Code pertence a outro evento e não pode ser confirmado aqui.', 'error');
        return;
      }

      const { data, error } = await supabaseClient
        .from('access_codes')
        .update({
          accessed: true,
          accessed_at: now,
          status: 'used',
          used_at: now
        })
        .eq('id', item.id)
        .eq('event_id', currentEventId)
        .or('accessed.is.null,accessed.eq.false')
        .select(`
          *,
          events (
            id,
            name,
            event_date,
            event_time,
            location
          )
        `)
        .maybeSingle();

      if (error) {
        showMessage('Erro ao confirmar acesso: ' + error.message, 'error');
        return;
      }

      if (!data) {
        clearResultOnly();
        showMessage('Este QR Code já foi utilizado ou pertence a outro evento.', 'warning');
        document.getElementById('codeInput').value = '';
        return;
      }

      clearResultOnly();
      document.getElementById('codeInput').value = '';

      alert(`ENTRADA CONFIRMADA ✅\n\n${buildAccessDetails(data, true)}`);

      showMessage(`Entrada confirmada com sucesso. Data/Hora: ${formatDateTimeBR(data.accessed_at)}`, 'success');

      await restartCamera();
    }

    async function restartCamera() {
      try {
        if (html5QrCode && cameraRunning) {
          await html5QrCode.stop();
          html5QrCode.clear();
          cameraRunning = false;
        }
      } catch (error) {
        console.warn('Erro ao parar câmera antes de reiniciar:', error);
      }

      processingScan = false;
      confirmationOpen = false;
      lastScannedCode = '';
      lastScanTime = 0;

      setTimeout(() => {
        startCamera();
      }, 700);
    }

    function releaseScanner() {
      setTimeout(() => {
        processingScan = false;
        lastScannedCode = '';
        lastScanTime = 0;
      }, 1200);
    }

    function renderResult(item, status) {
      const card = document.getElementById('resultCard');
      card.className = 'result-card active';

      if (status === 'invalid') {
        card.classList.add('used');
        card.innerHTML = `
          <div class="big-status used">QR CODE INVÁLIDO</div>
          <div class="result-row"><span>Código informado</span><span>${escapeHTML(document.getElementById('codeInput').value)}</span></div>
        `;
        return;
      }

      if (!item) return;

      const isUsed = item.accessed === true || status === 'used';
      card.classList.add(isUsed ? 'used' : 'available');

      const rows = buildResultRows(item, isUsed);

      card.innerHTML = `
        <div class="big-status ${isUsed ? 'used' : 'available'}">
          ${isUsed ? 'JÁ UTILIZADO' : 'LIBERADO PARA ACESSO'}
        </div>
        ${rows}
      `;
    }

    function buildResultRows(item, isUsed) {
      const rows = [];

      addRow(rows, 'Evento', getEventName(item));
      addRow(rows, 'Convidado', item.customer_name);
      addRow(rows, 'Data do evento', formatDateBR(getEventDate(item)));
      addRow(rows, 'Hora do evento', getEventTime(item));
      addRow(rows, 'Local', getEventLocation(item));
      addRow(rows, 'Mesa', item.table_number);
      addRow(rows, 'Lugar', item.seat_number);
      addRow(rows, 'Código', item.qr_code);
      addRow(rows, 'Acessado', isUsed ? 'Sim' : 'Não');
      addRow(rows, 'Data/Hora do acesso', formatDateTimeBR(item.accessed_at || item.used_at));

      return rows.join('');
    }

    function addRow(rows, label, value) {
      if (value === null || value === undefined || value === '') return;

      rows.push(`
        <div class="result-row">
          <span>${escapeHTML(label)}</span>
          <span>${escapeHTML(value)}</span>
        </div>
      `);
    }

    function buildAccessDetails(item, includeAccessTime) {
      const lines = [];

      addLine(lines, 'Evento', getEventName(item));
      addLine(lines, 'Convidado', item.customer_name);
      addLine(lines, 'Mesa', item.table_number);
      addLine(lines, 'Lugar', item.seat_number);
      addLine(lines, 'Código', item.qr_code);

      if (includeAccessTime) {
        addLine(lines, 'Data/Hora', formatDateTimeBR(item.accessed_at || item.used_at));
      }

      return lines.join('\n');
    }

    function addLine(lines, label, value) {
      if (value === null || value === undefined || value === '') return;
      lines.push(`${label}: ${value}`);
    }

    function getEventName(item) {
      return item.event_name || item.events?.name || currentEventData?.name || '';
    }

    function getEventDate(item) {
      return item.event_date || item.events?.event_date || currentEventData?.event_date || '';
    }

    function getEventTime(item) {
      const value = item.event_time || item.events?.event_time || currentEventData?.event_time || '';
      return value ? String(value).substring(0, 5) : '';
    }

    function getEventLocation(item) {
      return item.event_location || item.location || item.events?.location || currentEventData?.location || '';
    }

    function clearResultOnly() {
      document.getElementById('resultCard').className = 'result-card';
      document.getElementById('resultCard').innerHTML = '';
    }

    function clearScreen() {
      document.getElementById('codeInput').value = '';
      clearResultOnly();
      showMessage('Tela limpa.', 'info');
      releaseScanner();
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function formatDateBR(dateString) {
      if (!dateString) return '';

      const parts = String(dateString).split('-');
      if (parts.length !== 3) return dateString;

      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function formatTime(timeString) {
      if (!timeString) return '';
      return String(timeString).substring(0, 5);
    }

    function formatDateTimeBR(dateString) {
      if (!dateString) return '';

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return date.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>

</html>
