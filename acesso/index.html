<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bipagem de QR Codes - Controle de Acesso</title>

  <!--
    ALTER TABLE PARA ADICIONAR DATA/HORA DO ACESSO

    alter table public.access_codes
    add column if not exists accessed_at timestamptz;

    Se ainda não tiver a coluna accessed, rode também:

    alter table public.access_codes
    add column if not exists accessed boolean default false;
  -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f3f4f6;
      color: #111827;
      padding: 16px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .header {
      background: #111827;
      color: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      color: #d1d5db;
      font-size: 15px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 18px;
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 15px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .code-input {
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 16px;
      background: #111827;
    }

    .message {
      display: none;
      padding: 18px;
      border-radius: 16px;
      margin-top: 16px;
      font-size: 16px;
      line-height: 1.45;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.warning {
      display: block;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .message.info {
      display: block;
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .result-card {
      display: none;
      border-radius: 18px;
      padding: 20px;
      margin-top: 16px;
      border: 2px solid #e5e7eb;
      background: #ffffff;
    }

    .result-card.active {
      display: block;
    }

    .result-card.used {
      background: #fef2f2;
      border-color: #dc2626;
    }

    .result-card.available {
      background: #f0fdf4;
      border-color: #16a34a;
    }

    .result-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-row span:first-child {
      color: #6b7280;
    }

    .result-row span:last-child {
      font-weight: bold;
      text-align: right;
    }

    .big-status {
      font-size: 26px;
      font-weight: bold;
      text-align: center;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
    }

    .big-status.used {
      background: #dc2626;
      color: white;
    }

    .big-status.available {
      background: #16a34a;
      color: white;
    }

    .small-text {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
      margin-top: 8px;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .config-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 23px;
      }

      .card {
        padding: 16px;
      }

      button {
        width: 100%;
      }

      .result-row {
        flex-direction: column;
        gap: 4px;
      }

      .result-row span:last-child {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Bipagem de QR Codes</h1>
      <p>Leia o QR Code pela câmera ou digite o código do ingresso.</p>
    </div>

    <div class="card">
      <div class="config-grid">
        <div class="form-group">
          <label for="supabaseUrl">Supabase URL</label>
          <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co" />
        </div>

        <div class="form-group">
          <label for="supabaseKey">Supabase Anon Key</label>
          <input type="password" id="supabaseKey" placeholder="Cole sua anon public key" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="saveSupabaseConfig()">Conectar Supabase</button>
      </div>

      <p class="small-text">A URL deve ser somente até <strong>.supabase.co</strong>, sem <strong>/rest/v1</strong>.</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="codeInput">Código do QR Code</label>
        <input class="code-input" type="text" id="codeInput" placeholder="Digite ou leia o código" autocomplete="off" />
      </div>

      <div class="actions">
        <button class="btn-primary" id="searchButton" onclick="searchCode()">Pesquisar código</button>
        <button class="btn-secondary" onclick="clearScreen()">Limpar</button>
      </div>

      <div id="message" class="message"></div>

      <div id="resultCard" class="result-card"></div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 14px;">Câmera</h2>
      <div id="reader"></div>

      <div class="actions">
        <button class="btn-primary" id="startCameraButton" onclick="startCamera()">Abrir câmera</button>
        <button class="btn-danger" onclick="stopCamera()">Parar câmera</button>
      </div>

      <p class="small-text">No celular, permita o acesso à câmera quando o navegador solicitar.</p>
    </div>
  </div>

  <script>
    let supabaseClient = null;
    let html5QrCode = null;
    let cameraRunning = false;
    let lastScannedCode = '';
    let lastScanTime = 0;
    let processingScan = false;
    let confirmationOpen = false;

    const savedUrl = localStorage.getItem('supabase_url') || 'https://pfyctxoikdrephjogdtm.supabase.co';
    const savedKey = localStorage.getItem('supabase_key') || 'sb_publishable_h_5hK_HTT-XJ4WUoOGzkGg_tqkBDLjv';

    document.getElementById('supabaseUrl').value = savedUrl;
    document.getElementById('supabaseKey').value = savedKey;

    if (savedUrl && savedKey) {
      connectSupabase(savedUrl, savedKey);
      showMessage('Supabase conectado. Pronto para bipar.', 'success');
    } else {
      showMessage('Informe os dados do Supabase para começar.', 'info');
    }

    document.getElementById('codeInput').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        searchCode(false);
      }
    });

    function connectSupabase(url, key) {
      const { createClient } = supabase;
      supabaseClient = createClient(url, key);
    }

    function saveSupabaseConfig() {
      const url = document.getElementById('supabaseUrl').value.trim().replace('/rest/v1/', '').replace('/rest/v1', '');
      const key = document.getElementById('supabaseKey').value.trim();

      if (!url || !key) {
        showMessage('Informe a URL e a Anon Key do Supabase.', 'error');
        return;
      }

      localStorage.setItem('supabase_url', url);
      localStorage.setItem('supabase_key', key);
      connectSupabase(url, key);
      showMessage('Supabase conectado com sucesso.', 'success');
    }

    async function startCamera() {
      if (cameraRunning) return;

      try {
        html5QrCode = new Html5Qrcode('reader');

        await html5QrCode.start(
          { facingMode: 'environment' },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 }
          },
          async decodedText => {
            const now = Date.now();

            if (processingScan || confirmationOpen) return;

            if (decodedText === lastScannedCode && now - lastScanTime < 3000) {
              return;
            }

            processingScan = true;
            lastScannedCode = decodedText;
            lastScanTime = now;

            document.getElementById('codeInput').value = decodedText;
            await searchCode(true);
          }
        );

        cameraRunning = true;
        showMessage('Câmera aberta. Aponte para o QR Code.', 'info');
      } catch (error) {
        showMessage('Erro ao abrir a câmera: ' + error.message, 'error');
      }
    }

    async function stopCamera() {
      if (!html5QrCode || !cameraRunning) return;

      try {
        await html5QrCode.stop();
        html5QrCode.clear();
        cameraRunning = false;
        showMessage('Câmera parada.', 'info');
      } catch (error) {
        showMessage('Erro ao parar a câmera: ' + error.message, 'error');
      }
    }

    async function searchCode(fromCamera = false) {
      if (!supabaseClient) {
        showMessage('Conecte o Supabase primeiro.', 'error');
        releaseScanner();
        return;
      }

      const code = document.getElementById('codeInput').value.trim();
      const searchButton = document.getElementById('searchButton');

      if (!code) {
        showMessage('Informe ou leia um código.', 'error');
        releaseScanner();
        return;
      }

      searchButton.disabled = true;
      searchButton.textContent = 'Pesquisando...';

      const { data, error } = await supabaseClient
        .from('access_codes')
        .select('*')
        .eq('qr_code', code)
        .maybeSingle();

      searchButton.disabled = false;
      searchButton.textContent = 'Pesquisar código';

      if (error) {
        showMessage('Erro ao pesquisar código: ' + error.message, 'error');
        releaseScanner();
        return;
      }

      if (!data) {
        renderResult(null, 'invalid');
        showMessage('QR Code inválido. Código não encontrado na base.', 'error');
        releaseScanner();
        return;
      }

      if (data.accessed === true) {
        renderResult(data, 'used');
        showMessage('Este QR Code já foi utilizado.', 'warning');
        releaseScanner();
        return;
      }

      confirmationOpen = true;
      processingScan = true;

      const confirmAccess = confirm(
        `Confirmar acesso?

Evento: ${data.event_name}
Mesa: ${data.table_number}
Lugar: ${data.seat_number}
Código: ${data.qr_code}`
      );

      if (confirmAccess) {
        await confirmAccessCode(data);
      } else {
        showMessage('Acesso não confirmado.', 'info');
        clearResultOnly();
        document.getElementById('codeInput').value = '';
      }

      confirmationOpen = false;
      releaseScanner();
    }

    async function confirmAccessCode(item) {
      const now = new Date().toISOString();

      const { data, error } = await supabaseClient
        .from('access_codes')
        .update({
          accessed: true,
          accessed_at: now,
          status: 'used',
          used_at: now
        })
        .eq('id', item.id)
        .eq('accessed', false)
        .select('*')
        .maybeSingle();

      if (error) {
        showMessage('Erro ao confirmar acesso: ' + error.message, 'error');
        return;
      }

      if (!data) {
        clearResultOnly();
        showMessage('Este QR Code já foi utilizado por outro operador.', 'warning');
        document.getElementById('codeInput').value = '';
        return;
      }

      clearResultOnly();
      document.getElementById('codeInput').value = '';

      alert(
        `ENTRADA CONFIRMADA ✅\n\nEvento: ${data.event_name}\nMesa: ${data.table_number}\nLugar: ${data.seat_number}\nData/Hora: ${formatDateTimeBR(data.accessed_at)}`
      );

      showMessage(`Entrada confirmada com sucesso. Data/Hora: ${formatDateTimeBR(data.accessed_at)}`, 'success');

      await restartCamera();
    }

    async function restartCamera() {
      try {
        if (html5QrCode && cameraRunning) {
          await html5QrCode.stop();
          html5QrCode.clear();
          cameraRunning = false;
        }
      } catch (error) {
        console.warn('Erro ao parar câmera antes de reiniciar:', error);
      }

      processingScan = false;
      confirmationOpen = false;
      lastScannedCode = '';
      lastScanTime = 0;

      setTimeout(() => {
        startCamera();
      }, 700);
    }

    function releaseScanner() {
      setTimeout(() => {
        processingScan = false;
        lastScannedCode = '';
        lastScanTime = 0;
      }, 1200);
    }

    function renderResult(item, status) {
      const card = document.getElementById('resultCard');
      card.className = 'result-card active';

      if (status === 'invalid') {
        card.classList.add('used');
        card.innerHTML = `
          <div class="big-status used">QR CODE INVÁLIDO</div>
          <div class="result-row"><span>Código informado</span><span>${escapeHTML(document.getElementById('codeInput').value)}</span></div>
        `;
        return;
      }

      if (!item) return;

      const isUsed = item.accessed === true || status === 'used';
      card.classList.add(isUsed ? 'used' : 'available');

      card.innerHTML = `
        <div class="big-status ${isUsed ? 'used' : 'available'}">
          ${isUsed ? 'JÁ UTILIZADO' : 'LIBERADO PARA ACESSO'}
        </div>

        <div class="result-row"><span>Evento</span><span>${escapeHTML(item.event_name || '-')}</span></div>
        <div class="result-row"><span>Data do evento</span><span>${formatDateBR(item.event_date) || '-'}</span></div>
        <div class="result-row"><span>Hora do evento</span><span>${escapeHTML(item.event_time || '-')}</span></div>
        <div class="result-row"><span>Mesa</span><span>${item.table_number || '-'}</span></div>
        <div class="result-row"><span>Lugar</span><span>${item.seat_number || '-'}</span></div>
        <div class="result-row"><span>Código</span><span>${escapeHTML(item.qr_code || '-')}</span></div>
        <div class="result-row"><span>Acessado</span><span>${isUsed ? 'Sim' : 'Não'}</span></div>
        <div class="result-row"><span>Data/Hora do acesso</span><span>${formatDateTimeBR(item.accessed_at || item.used_at) || '-'}</span></div>
      `;
    }

    function clearResultOnly() {
      document.getElementById('resultCard').className = 'result-card';
      document.getElementById('resultCard').innerHTML = '';
    }

    function clearScreen() {
      document.getElementById('codeInput').value = '';
      clearResultOnly();
      showMessage('Tela limpa.', 'info');
      releaseScanner();
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function formatDateBR(dateString) {
      if (!dateString) return '';

      const parts = String(dateString).split('-');
      if (parts.length !== 3) return dateString;

      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function formatDateTimeBR(dateString) {
      if (!dateString) return '';

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return date.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
