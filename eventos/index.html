<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos - Controle de Acesso</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f3f4f6;
      color: #111827;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      position: relative;
      background: linear-gradient(135deg, #111827, #1e3a8a);
      color: white;
      padding: 30px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 12px 32px rgba(17, 24, 39, 0.18);
    }

    .header h1 {
      font-size: 34px;
      margin-bottom: 8px;
      padding-right: 70px;
    }

    .header p {
      color: #dbeafe;
      font-size: 16px;
      padding-right: 70px;
    }

    .config-button {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      margin-bottom: 22px;
    }

    .config-box {
      display: none;
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    button,
    .btn-link {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .btn-success:hover {
      background: #15803d;
    }

    .btn-dark {
      background: #111827;
      color: white;
    }

    .btn-dark:hover {
      background: #030712;
    }

    .message {
      display: none;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .message.info {
      display: block;
      background: #dbeafe;
      color: #1e40af;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .event-card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
      border: 1px solid #eef2f7;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .event-card h2 {
      font-size: 22px;
      line-height: 1.2;
    }

    .event-meta {
      display: grid;
      gap: 8px;
      color: #4b5563;
      font-size: 14px;
    }

    .event-meta div {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .event-id {
      background: #f3f4f6;
      color: #6b7280;
      font-size: 12px;
      padding: 10px;
      border-radius: 10px;
      word-break: break-all;
    }

    .event-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: auto;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      background: white;
      border: 1px dashed #d1d5db;
      color: #6b7280;
      border-radius: 20px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }

    .summary-box {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .summary-box span {
      display: block;
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .summary-box strong {
      font-size: 30px;
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .header h1 {
        font-size: 26px;
      }

      .config-grid,
      .toolbar,
      .summary {
        grid-template-columns: 1fr;
      }

      .events-grid {
        grid-template-columns: 1fr;
      }

      button,
      .btn-link {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <button class="config-button" onclick="toggleConfig()" title="Configurações">⚙️</button>
      <h1>Eventos cadastrados</h1>
      <p>Escolha um evento para bipar, gerar QR Codes ou acompanhar o dashboard.</p>
    </div>

    <div id="message" class="message"></div>

    <div class="card config-box" id="configBox">
      <div class="config-grid">
        <div class="form-group">
          <label for="supabaseUrl">Supabase URL</label>
          <input id="supabaseUrl" type="text" placeholder="https://xxxx.supabase.co" />
        </div>
        <div class="form-group">
          <label for="supabaseKey">Supabase Anon Key</label>
          <input id="supabaseKey" type="password" placeholder="Cole sua anon/public key" />
        </div>
      </div>
      <button class="btn-primary" onclick="saveConfig()">Salvar e conectar</button>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="form-group">
          <label for="searchInput">Buscar evento</label>
          <input id="searchInput" type="text" placeholder="Busque por nome, local, data ou ID"
            oninput="renderEvents()" />
        </div>
        <button class="btn-primary" onclick="loadEvents()">Atualizar eventos</button>
      </div>
    </div>

    <div class="summary">
      <div class="summary-box">
        <span>Total de eventos</span>
        <strong id="totalEvents">0</strong>
      </div>
      <div class="summary-box">
        <span>Próximos eventos</span>
        <strong id="upcomingEvents">0</strong>
      </div>
      <div class="summary-box">
        <span>Eventos passados</span>
        <strong id="pastEvents">0</strong>
      </div>
    </div>

    <div id="eventsContainer" class="events-grid"></div>
  </div>

  <script>
    let supabaseClient = null;
    let events = [];

    const savedUrl = localStorage.getItem('supabase_url') || 'https://pfyctxoikdrephjogdtm.supabase.co';
    const savedKey = localStorage.getItem('supabase_key') || 'sb_publishable_h_5hK_HTT-XJ4WUoOGzkGg_tqkBDLjv';

    document.getElementById('supabaseUrl').value = savedUrl;
    document.getElementById('supabaseKey').value = savedKey;

    if (savedUrl && savedKey) {
      connectSupabase(savedUrl, savedKey);
      loadEvents();
    } else {
      toggleConfig();
      showMessage('Configure o Supabase para carregar os eventos.', 'info');
    }

    function toggleConfig() {
      const box = document.getElementById('configBox');
      box.style.display = box.style.display === 'none' || !box.style.display ? 'block' : 'none';
    }

    function connectSupabase(url, key) {
      const { createClient } = supabase;
      supabaseClient = createClient(url, key);
    }

    async function saveConfig() {
      const url = document.getElementById('supabaseUrl').value.trim().replace('/rest/v1/', '').replace('/rest/v1', '');
      const key = document.getElementById('supabaseKey').value.trim();

      if (!url || !key) {
        showMessage('Informe a URL e a Anon Key do Supabase.', 'error');
        return;
      }

      localStorage.setItem('supabase_url', url);
      localStorage.setItem('supabase_key', key);
      connectSupabase(url, key);
      showMessage('Supabase conectado. Carregando eventos...', 'success');
      await loadEvents();
    }

    async function loadEvents() {
      if (!supabaseClient) {
        showMessage('Conecte o Supabase primeiro.', 'error');
        return;
      }

      const { data, error } = await supabaseClient
        .from('events')
        .select('id, name, event_date, event_time, location, created_at')
        .order('event_date', { ascending: true });

      if (error) {
        showMessage('Erro ao carregar eventos: ' + error.message, 'error');
        return;
      }

      events = data || [];
      renderEvents();
      updateSummary();
      showMessage('Eventos carregados com sucesso.', 'success');
    }

    function renderEvents() {
      const container = document.getElementById('eventsContainer');
      const search = document.getElementById('searchInput').value.trim().toLowerCase();

      const filtered = events.filter(event => {
        if (!search) return true;

        const values = [
          event.id,
          event.name,
          event.location,
          event.event_date,
          event.event_time
        ];

        return values
          .filter(value => value !== null && value !== undefined)
          .some(value => String(value).toLowerCase().includes(search));
      });

      if (filtered.length === 0) {
        container.className = '';
        container.innerHTML = `
          <div class="empty-state">
            Nenhum evento encontrado.
          </div>
        `;
        return;
      }

      container.className = 'events-grid';
      container.innerHTML = filtered.map(event => {
        const eventId = encodeURIComponent(event.id);

        return `
          <div class="event-card">
            <div>
              <h2>${escapeHTML(event.name || 'Evento sem nome')}</h2>
            </div>

            <div class="event-meta">
              <div>📅 <strong>${formatDateBR(event.event_date) || '-'}</strong></div>
              <div>⏰ <strong>${formatTime(event.event_time) || '-'}</strong></div>
              <div>📍 <strong>${escapeHTML(event.location || '-')}</strong></div>
            </div>

            <div class="event-id">
              ID: ${escapeHTML(event.id)}
            </div>

            <div class="event-actions">
            <a class="btn-link btn-success" href="/qrcode/acesso/?event_id=${eventId}">Bipagem</a>

            <a class="btn-link btn-primary" href="/qrcode/?event_id=${eventId}">
              Cadastro / Gerador de QR Code
            </a>

            <a class="btn-link btn-dark" href="/qrcode/dashboard/?event_id=${eventId}">
              Dashboard
            </a>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateSummary() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const upcoming = events.filter(event => {
        if (!event.event_date) return false;
        const date = new Date(event.event_date + 'T00:00:00');
        return date >= today;
      }).length;

      const past = events.filter(event => {
        if (!event.event_date) return false;
        const date = new Date(event.event_date + 'T00:00:00');
        return date < today;
      }).length;

      document.getElementById('totalEvents').textContent = events.length;
      document.getElementById('upcomingEvents').textContent = upcoming;
      document.getElementById('pastEvents').textContent = past;
    }

    function formatDateBR(dateString) {
      if (!dateString) return '';
      const parts = String(dateString).split('-');
      if (parts.length !== 3) return dateString;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function formatTime(timeString) {
      if (!timeString) return '';
      return String(timeString).substring(0, 5);
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;

      setTimeout(() => {
        message.className = 'message';
        message.textContent = '';
      }, 4500);
    }
  </script>
</body>

</html>
