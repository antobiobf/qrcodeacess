<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Presença</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1e3a8a);
      color: #111827;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,.22);
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      background: #dbeafe;
      color: #1e40af;
    }
    .icon.success { background: #dcfce7; color: #166534; }
    .icon.error { background: #fee2e2; color: #991b1b; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { color: #4b5563; line-height: 1.5; margin-bottom: 8px; }
    .details {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .details div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .details div:last-child { border-bottom: none; }
    .details span:first-child { color: #6b7280; }
    .details span:last-child { font-weight: bold; text-align: right; }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 18px;
      background: #16a34a;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 14px;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .message {
      display: none;
      padding: 14px;
      border-radius: 14px;
      margin-top: 16px;
      font-size: 14px;
    }
    .message.success { display: block; background: #dcfce7; color: #166534; }
    .message.error { display: block; background: #fee2e2; color: #991b1b; }
    .message.info { display: block; background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="statusIcon">⏳</div>
    <h1 id="title">Confirmar presença</h1>
    <p id="subtitle">Carregando seus dados...</p>

    <div class="details" id="detailsBox" style="display:none;"></div>

    <button id="confirmButton" onclick="confirmPresence()" disabled>Confirmar minha presença</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    let supabaseClient = null;
    let guestId = null;
    let guestData = null;

    const savedUrl = localStorage.getItem('supabase_url') || 'https://pfyctxoikdrephjogdtm.supabase.co';
    const savedKey = localStorage.getItem('supabase_key') || 'sb_publishable_h_5hK_HTT-XJ4WUoOGzkGg_tqkBDLjv';

    initializePage();

    async function initializePage() {
      const params = new URLSearchParams(window.location.search);
      guestId = params.get('guest_id');

      if (!guestId) {
        setError('Link inválido', 'O link de confirmação está sem o código do convidado.');
        return;
      }

      if (!savedUrl || !savedKey) {
        setError('Configuração ausente', 'Não foi possível conectar ao Supabase neste navegador.');
        return;
      }

      const { createClient } = supabase;
      supabaseClient = createClient(savedUrl, savedKey);

      await loadGuest();
    }

    async function loadGuest() {
      const { data, error } = await supabaseClient
        .from('event_guests')
        .select(`
          *,
          events (
            id,
            name,
            event_date,
            event_time,
            location
          )
        `)
        .eq('id', guestId)
        .maybeSingle();

      if (error) {
        setError('Erro ao carregar', error.message);
        return;
      }

      if (!data) {
        setError('Convidado não encontrado', 'Não encontramos este convite na lista do evento.');
        return;
      }

      guestData = data;
      renderGuest();
    }

    function renderGuest() {
      document.getElementById('statusIcon').textContent = guestData.confirmed ? '✅' : '👋';
      document.getElementById('statusIcon').className = guestData.confirmed ? 'icon success' : 'icon';
      document.getElementById('title').textContent = guestData.confirmed ? 'Presença já confirmada' : 'Confirme sua presença';
      document.getElementById('subtitle').textContent = guestData.confirmed
        ? 'Obrigado! Sua presença já está confirmada.'
        : `Olá, ${guestData.guest_name}. Confirme abaixo sua presença no evento.`;

      const event = guestData.events || {};
      const rows = [
        ['Convidado', guestData.guest_name],
        ['Grupo', guestData.group_name],
        ['Evento', event.name],
        ['Data', formatDateBR(event.event_date)],
        ['Hora', formatTime(event.event_time)],
        ['Local', event.location]
      ].filter(row => row[1]);

      document.getElementById('detailsBox').style.display = 'block';
      document.getElementById('detailsBox').innerHTML = rows.map(([label, value]) => `
        <div><span>${escapeHTML(label)}</span><span>${escapeHTML(value)}</span></div>
      `).join('');

      const button = document.getElementById('confirmButton');
      button.disabled = guestData.confirmed === true;
      button.textContent = guestData.confirmed ? 'Presença confirmada' : 'Confirmar minha presença';
    }

    async function confirmPresence() {
      if (!guestData || guestData.confirmed) return;

      const button = document.getElementById('confirmButton');
      button.disabled = true;
      button.textContent = 'Confirmando...';

      const { data, error } = await supabaseClient
        .from('event_guests')
        .update({
          confirmed: true,
          confirmed_at: new Date().toISOString()
        })
        .eq('id', guestId)
        .select(`
          *,
          events (
            id,
            name,
            event_date,
            event_time,
            location
          )
        `)
        .maybeSingle();

      if (error) {
        showMessage('Erro ao confirmar presença: ' + error.message, 'error');
        button.disabled = false;
        button.textContent = 'Confirmar minha presença';
        return;
      }

      guestData = data;
      renderGuest();
      showMessage('Presença confirmada com sucesso. Obrigado!', 'success');
    }

    function setError(title, subtitle) {
      document.getElementById('statusIcon').textContent = '⚠️';
      document.getElementById('statusIcon').className = 'icon error';
      document.getElementById('title').textContent = title;
      document.getElementById('subtitle').textContent = subtitle;
      document.getElementById('confirmButton').style.display = 'none';
    }

    function formatDateBR(dateString) {
      if (!dateString) return '';
      const parts = String(dateString).split('-');
      if (parts.length !== 3) return dateString;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function formatTime(timeString) {
      if (!timeString) return '';
      return String(timeString).substring(0, 5);
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;
    }
  </script>
</body>
</html>
