<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Confirmar Presença</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, .18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, .16), transparent 35%),
        linear-gradient(135deg, #0f172a, #1e3a8a);
      padding: 20px;
      color: #111827;
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, .35);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .25);
      margin-bottom: 18px;
    }

    .icon {
      width: 82px;
      height: 82px;
      border-radius: 999px;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1d4ed8;
      box-shadow: 0 15px 40px rgba(37, 99, 235, .18);
    }

    .icon.success {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #166534;
      box-shadow: 0 15px 40px rgba(22, 163, 74, .18);
    }

    .icon.error {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: #991b1b;
      box-shadow: 0 15px 40px rgba(220, 38, 38, .18);
    }

    h1 {
      font-size: 34px;
      line-height: 1.1;
      margin-bottom: 14px;
      text-align: center;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .details {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 18px;
      margin-top: 18px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #64748b;
      font-weight: 600;
    }

    .detail-value {
      text-align: right;
      font-weight: 700;
      color: #111827;
    }

    .invite-image-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      margin-top: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .15);
      border: 1px solid rgba(255, 255, 255, .6);
    }

    .invite-image-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 980px;
    }

    .maps-card {
      margin-top: 20px;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .15);
    }

    .maps-header {
      padding: 22px;
      border-bottom: 1px solid #e5e7eb;
    }

    .maps-header h3 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .maps-header p {
      color: #64748b;
      line-height: 1.5;
    }

    .maps-frame {
      width: 100%;
      height: 360px;
      border: none;
    }

    .maps-actions {
      padding: 20px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: .25s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 0 15px 40px rgba(37, 99, 235, .28);
    }

    .btn-success {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      box-shadow: 0 15px 40px rgba(22, 163, 74, .24);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #111827;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 600;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .ticket-card {
      display: none;
    }

    .ticket-card.active {
      display: block;
    }

    .ticket-preview {
      margin-top: 20px;
      background: #ffffff;
      border-radius: 28px;
      padding: 28px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .12);
      text-align: center;
    }

    .ticket-preview h2 {
      font-size: 26px;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .event-meta {
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    #qrCanvas {
      width: 230px !important;
      height: 230px !important;
      margin: 0 auto 20px;
      display: block;
    }

    .qr-code-text {
      background: #f1f5f9;
      padding: 14px;
      border-radius: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .guest-name {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
    }

    .ticket-type {
      color: #64748b;
      margin-top: 6px;
    }

    .ticket-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .used-alert {
      margin-top: 18px;
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border: 1px solid #fca5a5;
      border-radius: 22px;
      padding: 20px;
      text-align: center;
    }

    .used-alert strong {
      display: block;
      font-size: 18px;
      color: #991b1b;
      margin-bottom: 8px;
    }

    .used-alert span {
      color: #7f1d1d;
      font-size: 15px;
      line-height: 1.5;
    }

    @media(max-width: 640px) {

      body {
        padding: 14px;
      }

      .card {
        padding: 22px;
        border-radius: 24px;
      }

      h1 {
        font-size: 28px;
      }

      .detail-row {
        flex-direction: column;
      }

      .detail-value {
        text-align: left;
      }

      .ticket-actions {
        grid-template-columns: 1fr;
      }

      .maps-frame {
        height: 280px;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="card">

      <div class="icon" id="statusIcon">⏳</div>

      <h1 id="title">Confirmar presença</h1>

      <p class="subtitle" id="subtitle">
        Carregando informações do seu convite...
      </p>

      <div class="details" id="detailsBox" style="display:none;"></div>

      <div id="inviteContainer" style="display:none;"></div>

      <div id="mapsContainer" style="display:none;"></div>

      <div id="usedAlertContainer"></div>

      <button
        id="confirmButton"
        class="btn-success"
        onclick="confirmPresence()"
        disabled
        style="margin-top:22px;">
        Confirmar minha presença
      </button>

      <div id="message" class="message"></div>
    </div>

    <div class="card ticket-card" id="ticketCard">

      <div class="ticket-preview">

        <h2 id="ticketEventName">Evento</h2>

        <div class="event-meta" id="ticketEventMeta">-</div>

        <canvas id="qrCanvas"></canvas>

        <div class="qr-code-text" id="ticketCodeText">-</div>

        <div class="guest-name" id="ticketGuestName">-</div>

        <div class="ticket-type">
          Ingresso individual
        </div>

      </div>

      <div class="ticket-actions">

        <button class="btn-primary" onclick="downloadTicketPDF()">
          Baixar PDF
        </button>

        <button class="btn-secondary" onclick="copyTicketCode()">
          Copiar código
        </button>

      </div>

    </div>

  </div>

  <script>

    let supabaseClient = null;
    let guestId = null;
    let guestData = null;
    let accessCodeData = null;

    const savedUrl =
      localStorage.getItem('supabase_url')
      || 'https://pfyctxoikdrephjogdtm.supabase.co';

    const savedKey =
      localStorage.getItem('supabase_key')
      || 'sb_publishable_h_5hK_HTT-XJ4WUoOGzkGg_tqkBDLjv';

    initializePage();

    async function initializePage() {

      const params = new URLSearchParams(window.location.search);

      guestId = params.get('guest_id');

      if (!guestId) {
        setError(
          'Link inválido',
          'O link enviado está incompleto.'
        );
        return;
      }

      const { createClient } = supabase;

      supabaseClient = createClient(savedUrl, savedKey);

      await loadGuest();
    }

    async function loadGuest() {

      const { data, error } = await supabaseClient
        .from('event_guests')
        .select(`
          *,
          events (
            id,
            name,
            event_date,
            event_time,
            location,
            google_maps_link,
            invitation_image_url
          )
        `)
        .eq('id', guestId)
        .maybeSingle();

      if (error || !data) {
        setError(
          'Convite não encontrado',
          error?.message || 'Não encontramos este convidado.'
        );
        return;
      }

      guestData = data;

      if (data.access_code_id) {
        await loadAccessCode(data.access_code_id);
      }

      renderGuest();
    }

    async function loadAccessCode(id) {

      const { data } = await supabaseClient
        .from('access_codes')
        .select('*')
        .eq('id', id)
        .maybeSingle();

      accessCodeData = data || null;
    }

    function renderGuest() {

      const isConfirmed = guestData.confirmed === true;
      const event = guestData.events || {};

      document.getElementById('statusIcon').textContent =
        isConfirmed ? '✅' : '🎉';

      document.getElementById('statusIcon').className =
        isConfirmed ? 'icon success' : 'icon';

      document.getElementById('title').textContent =
        isConfirmed
          ? 'Presença confirmada'
          : `Olá, ${guestData.guest_name}`;

      document.getElementById('subtitle').textContent =
        isConfirmed
          ? 'Seu ingresso individual já está disponível abaixo.'
          : 'Confirme sua presença no evento e gere seu QR Code individual.';

      const rows = [
        ['Convidado', guestData.guest_name],
        ['Grupo', guestData.group_name],
        ['Evento', event.name],
        ['Data', formatDateBR(event.event_date)],
        ['Hora', formatTime(event.event_time)],
        ['Local', event.location]
      ].filter(r => r[1]);

      document.getElementById('detailsBox').style.display = 'block';

      document.getElementById('detailsBox').innerHTML =
        rows.map(([label, value]) => `
          <div class="detail-row">
            <div class="detail-label">${escapeHTML(label)}</div>
            <div class="detail-value">${escapeHTML(value)}</div>
          </div>
        `).join('');

      renderInviteImage();
      renderGoogleMaps();

      const button = document.getElementById('confirmButton');

      button.disabled = isConfirmed;

      button.textContent =
        isConfirmed
          ? 'Presença confirmada'
          : 'Confirmar minha presença';

      if (isConfirmed && accessCodeData) {
        renderTicket();
      }
    }

    function renderInviteImage() {

      const container = document.getElementById('inviteContainer');

      const imageUrl =
        guestData?.events?.invitation_image_url;

      if (!imageUrl) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'block';

      container.innerHTML = `
        <div class="invite-image-card">
          <img
            src="${escapeHTML(imageUrl)}"
            alt="Convite do evento" />
        </div>
      `;
    }

    function renderGoogleMaps() {

      const container =
        document.getElementById('mapsContainer');

      const event = guestData?.events || {};

      const mapsLink =
        event.google_maps_link;

      if (!mapsLink) {
        container.style.display = 'none';
        container.innerHTML = '';
        return;
      }

      let embedUrl = '';

      try {

        if (mapsLink.includes('/embed?')) {

          embedUrl = mapsLink;

        } else {

          const encoded =
            encodeURIComponent(event.location || mapsLink);

          embedUrl =
            `https://www.google.com/maps?q=${encoded}&output=embed`;
        }

      } catch {

        const encoded =
          encodeURIComponent(event.location || '');

        embedUrl =
          `https://www.google.com/maps?q=${encoded}&output=embed`;
      }

      container.style.display = 'block';

      container.innerHTML = `
        <div class="maps-card">

          <div class="maps-header">
            <h3>📍 Como chegar</h3>
            <p>${escapeHTML(event.location || '')}</p>
          </div>

          <iframe
            class="maps-frame"
            loading="lazy"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
            src="${embedUrl}">
          </iframe>

          <div class="maps-actions">
            <button
              class="btn-primary"
              onclick="window.open('${escapeHTML(mapsLink)}', '_blank')">
              Abrir rota no Google Maps
            </button>
          </div>

        </div>
      `;
    }

    async function confirmPresence() {

      const button =
        document.getElementById('confirmButton');

      button.disabled = true;
      button.textContent = 'Confirmando...';

      const { data, error } = await supabaseClient
        .from('event_guests')
        .update({
          confirmed: true,
          confirmed_at: new Date().toISOString()
        })
        .eq('id', guestId)
        .select(`
          *,
          events (
            id,
            name,
            event_date,
            event_time,
            location,
            google_maps_link,
            invitation_image_url
          )
        `)
        .maybeSingle();

      if (error) {

        button.disabled = false;
        button.textContent = 'Confirmar minha presença';

        showMessage(error.message, 'error');
        return;
      }

      guestData = data;

      await createAccessCode();

      renderGuest();

      showMessage(
        'Presença confirmada com sucesso.',
        'success'
      );
    }

    async function createAccessCode() {

      const event = guestData.events || {};

      const code = generateCode();

      const payload = {
        event_id: event.id,
        event_name: event.name,
        event_date: event.event_date,
        event_time: event.event_time,
        qr_code: code,
        customer_name: guestData.guest_name,
        customer_whatsapp: guestData.whatsapp,
        source_guest_id: guestData.id,
        accessed: false,
        status: 'pending',
        ticket_type: 'individual'
      };

      const { data, error } = await supabaseClient
        .from('access_codes')
        .insert(payload)
        .select('*')
        .maybeSingle();

      if (error) {
        showMessage(error.message, 'error');
        return;
      }

      accessCodeData = data;

      await supabaseClient
        .from('event_guests')
        .update({
          access_code_id: data.id
        })
        .eq('id', guestData.id);

      renderTicket();
    }

    function renderTicket() {

      if (!accessCodeData) return;

      const event = guestData.events || {};

      const alreadyUsed =
        accessCodeData.accessed === true;

      const accessedAt =
        accessCodeData.accessed_at
        || accessCodeData.used_at;

      document.getElementById('ticketCard')
        .classList.add('active');

      document.getElementById('ticketEventName')
        .textContent = event.name || '';

      document.getElementById('ticketEventMeta')
        .textContent =
        `${formatDateBR(event.event_date)} • ${formatTime(event.event_time)} • ${event.location || ''}`;

      document.getElementById('ticketCodeText')
        .textContent = accessCodeData.qr_code;

      document.getElementById('ticketGuestName')
        .textContent = guestData.guest_name;

      QRCode.toCanvas(
        document.getElementById('qrCanvas'),
        accessCodeData.qr_code,
        {
          width: 240,
          margin: 2
        }
      );

      if (alreadyUsed) {

        document.getElementById('statusIcon').textContent = '🚫';

        document.getElementById('statusIcon').className =
          'icon error';

        document.getElementById('title').textContent =
          'QR Code já utilizado';

        document.getElementById('subtitle').innerHTML = `
          Este ingresso já foi utilizado anteriormente.
        `;

        document.getElementById('usedAlertContainer').innerHTML = `
          <div class="used-alert">
            <strong>Entrada já registrada</strong>
            <span>
              Este QR Code foi utilizado em
              ${formatDateTimeBR(accessedAt)}.
            </span>
          </div>
        `;

        document.getElementById('confirmButton')
          .style.display = 'none';

      } else {

        document.getElementById('statusIcon').textContent = '✅';

        document.getElementById('statusIcon').className =
          'icon success';

        document.getElementById('title').textContent =
          'Presença confirmada';

        document.getElementById('subtitle').innerHTML =
          'Seu ingresso individual já está disponível abaixo.';
      }

      setTimeout(() => {

        document.getElementById('ticketCard')
          .scrollIntoView({
            behavior: 'smooth'
          });

      }, 400);
    }

    async function downloadTicketPDF() {

      const canvas =
        document.getElementById('qrCanvas');

      const image = canvas.toDataURL('image/png');

      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [80, 120]
      });

      pdf.setFontSize(16);

      pdf.text(
        guestData.events.name || 'Evento',
        40,
        12,
        { align: 'center' }
      );

      pdf.setFontSize(10);

      pdf.text(
        formatDateBR(guestData.events.event_date),
        40,
        18,
        { align: 'center' }
      );

      pdf.addImage(image, 'PNG', 17, 26, 46, 46);

      pdf.text(
        accessCodeData.qr_code,
        40,
        80,
        { align: 'center' }
      );

      pdf.save('ingresso.pdf');
    }

    async function copyTicketCode() {

      await navigator.clipboard.writeText(
        accessCodeData.qr_code
      );

      showMessage(
        'Código copiado.',
        'success'
      );
    }

    function generateCode() {

      return (
        'QR-' +
        Math.random()
          .toString(36)
          .substring(2, 10)
          .toUpperCase()
      );
    }

    function setError(title, subtitle) {

      document.getElementById('statusIcon')
        .textContent = '⚠️';

      document.getElementById('statusIcon')
        .className = 'icon error';

      document.getElementById('title')
        .textContent = title;

      document.getElementById('subtitle')
        .textContent = subtitle;

      document.getElementById('confirmButton')
        .style.display = 'none';
    }

    function showMessage(text, type) {

      const el =
        document.getElementById('message');

      el.textContent = text;
      el.className = `message ${type}`;
    }

    function formatDateBR(date) {

      if (!date) return '';

      const parts = String(date).split('-');

      if (parts.length !== 3) return date;

      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function formatDateTimeBR(dateString) {

      if (!dateString) return '-';

      const date = new Date(dateString);

      if (Number.isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatTime(time) {

      if (!time) return '';

      return String(time).substring(0, 5);
    }

    function escapeHTML(value) {

      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

  </script>

</body>

</html>
