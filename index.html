<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de QR Codes - Controle de Acesso</title>

  <!--
    SQL / ALTER TABLE PARA O SUPABASE

    create table if not exists public.access_codes (
      id uuid primary key default gen_random_uuid(),
      event_name text not null,
      event_date text,
      event_time text,
      ticket_type text default 'mesa',
      customer_name text,
      customer_email text,
      customer_whatsapp text,
      accessed boolean default false,
      accessed_at timestamptz null,
      table_number integer,
      seat_number integer,
      qr_code text not null unique,
      status text not null default 'pending',
      used_at timestamptz null,
      created_at timestamptz not null default now()
    );

    alter table public.access_codes
    add column if not exists event_date text,
    add column if not exists event_time text,
    add column if not exists ticket_type text default 'mesa',
    add column if not exists customer_name text,
    add column if not exists customer_email text,
    add column if not exists customer_whatsapp text,
    add column if not exists accessed boolean default false,
    add column if not exists accessed_at timestamptz;

    alter table public.access_codes
    alter column table_number drop not null,
    alter column seat_number drop not null;
  -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      color: #111827;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      position: relative;
      background: #111827;
      color: #ffffff;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      padding-right: 54px;
    }

    .header p {
      color: #d1d5db;
      font-size: 15px;
      padding-right: 54px;
    }

    .header-menu {
      position: absolute;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 10px;
    }

    .config-menu-button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(10px);
    }

    .config-menu-button:hover {
      background: rgba(255,255,255,0.16);
      transform: scale(1.03);
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .config-box {
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      margin-bottom: 24px;
    }

    .form-grid,
    .config-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .config-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input,
    select {
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .message.info {
      display: block;
      background: #dbeafe;
      color: #1e40af;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .summary-box span {
      display: block;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .summary-box strong {
      font-size: 26px;
    }

    .tabs-nav {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .tab-button {
      background: #e5e7eb;
      color: #111827;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
    }

    .tab-button.active {
      background: #2563eb;
      color: white;
    }

    .table-section {
      margin-bottom: 28px;
    }

    .table-title {
      font-size: 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
    }

    .qr-card {
      position: relative;
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    }

    .qr-card canvas {
      width: 150px !important;
      height: 150px !important;
      margin-bottom: 12px;
    }

    .qr-code-text {
      font-weight: bold;
      font-size: 14px;
      word-break: break-all;
      background: #f3f4f6;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .qr-info {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
      min-height: 34px;
    }

    .qr-card.used {
      border: 2px solid #dc2626;
      background: #fef2f2;
    }

    .used-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #dc2626;
      color: white;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
    }

    .qr-card.used .qr-code-text {
      background: #fee2e2;
      color: #991b1b;
    }

    .qr-card button {
      width: 100%;
      padding: 10px;
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
      background: #ffffff;
      border-radius: 16px;
      border: 1px dashed #d1d5db;
    }

    .small-text {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.4;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .form-grid,
      .config-grid,
      .summary {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 23px;
      }

      .card {
        padding: 18px;
      }

      .actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-menu">
        <button class="config-menu-button" onclick="toggleConfig()" title="Configurações">
          ⚙️
        </button>
      </div>

      <h1>Gerador de QR Codes</h1>
      <p>Crie QR Codes por mesa ou ingressos individuais e salve tudo no Supabase.</p>
    </div>

    <div class="card config-box" id="configContainer" style="display:none;">
      <div class="config-grid">
        <div class="form-group">
          <label for="supabaseUrl">Supabase URL</label>
          <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co" />
        </div>

        <div class="form-group">
          <label for="supabaseKey">Supabase Anon Key</label>
          <input type="password" id="supabaseKey" placeholder="Cole sua anon public key" />
        </div>

        <div class="form-group">
          <label for="eventName">Nome do evento</label>
          <input type="text" id="eventName" placeholder="Ex: Geraldinho" />
        </div>

        <div class="form-group">
          <label for="eventDate">Data do evento</label>
          <input type="date" id="eventDate" />
        </div>

        <div class="form-group">
          <label for="eventTime">Hora do evento</label>
          <input type="time" id="eventTime" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="saveSupabaseConfig()">Conectar Supabase</button>
        <button class="btn-secondary" onclick="loadCodesFromSupabase()">Atualizar lista</button>
      </div>

      <p class="small-text">
        Use a URL do projeto e a chave anon/public do Supabase. A tabela precisa se chamar <strong>access_codes</strong>.
      </p>
    </div>

    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label for="ticketType">Tipo de QR Code</label>
          <select id="ticketType" onchange="toggleTicketType()">
            <option value="mesa">Mesa</option>
            <option value="individual">Ingresso individual</option>
          </select>
        </div>

        <div class="form-group">
          <label for="customerName">Nome</label>
          <input type="text" id="customerName" placeholder="Ex: Antônio" />
        </div>

        <div class="form-group">
          <label for="customerEmail">E-mail</label>
          <input type="email" id="customerEmail" placeholder="Ex: cliente@email.com" />
        </div>

        <div class="form-group">
          <label for="customerWhatsapp">WhatsApp</label>
          <input type="text" id="customerWhatsapp" placeholder="Ex: 81999999999" />
        </div>

        <div class="form-group mesa-field">
          <label for="tableNumber">Número da mesa</label>
          <input type="number" id="tableNumber" placeholder="Ex: 1" min="1" />
        </div>

        <div class="form-group mesa-field">
          <label for="guestQuantity">Quantidade de lugares</label>
          <input type="number" id="guestQuantity" placeholder="Ex: 4" min="1" max="50" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="generateButton" onclick="generateQRCodes()">Gerar QR Codes</button>
        <button class="btn-secondary" onclick="downloadAllQRCodes()">Baixar todos</button>
      </div>

      <div id="message" class="message"></div>
    </div>

    <div class="summary">
      <div class="summary-box">
        <span>Mesas criadas</span>
        <strong id="totalTables">0</strong>
      </div>
      <div class="summary-box">
        <span>QR Codes gerados</span>
        <strong id="totalCodes">0</strong>
      </div>
      <div class="summary-box">
        <span>Ingressos individuais</span>
        <strong id="totalIndividual">0</strong>
      </div>
    </div>

    <div class="tabs-nav">
      <button class="tab-button active" id="tabMesa" onclick="setActiveTab('mesa')">QR Codes de mesa</button>
      <button class="tab-button" id="tabIndividual" onclick="setActiveTab('individual')">Ingressos individuais</button>
    </div>

    <div id="qrContainer"></div>
  </div>

  <script>
    let supabaseClient = null;
    let allCodes = [];
    let activeTab = 'mesa';

    const savedUrl = localStorage.getItem('supabase_url') || 'https://pfyctxoikdrephjogdtm.supabase.co';
    const savedKey = localStorage.getItem('supabase_key') || 'sb_publishable_h_5hK_HTT-XJ4WUoOGzkGg_tqkBDLjv';
    const savedEventName = localStorage.getItem('event_name') || '';
    const savedEventDate = localStorage.getItem('event_date') || '';
    const savedEventTime = localStorage.getItem('event_time') || '';

    document.getElementById('supabaseUrl').value = savedUrl;
    document.getElementById('supabaseKey').value = savedKey;
    document.getElementById('eventName').value = savedEventName;
    document.getElementById('eventDate').value = savedEventDate;
    document.getElementById('eventTime').value = savedEventTime;

    toggleTicketType();

    if (savedUrl && savedKey) {
      connectSupabase(savedUrl, savedKey);
      loadCodesFromSupabase();
    } else {
      renderQRCodes();
      updateSummary();
      showMessage('Informe os dados do Supabase para carregar os QR Codes.', 'info');
    }

    function toggleConfig() {
      const container = document.getElementById('configContainer');
      container.style.display = container.style.display === 'none' ? 'block' : 'none';
    }

    function toggleTicketType() {
      const ticketType = document.getElementById('ticketType').value;
      const mesaFields = document.querySelectorAll('.mesa-field');
      const generateButton = document.getElementById('generateButton');

      mesaFields.forEach(field => {
        field.style.display = ticketType === 'mesa' ? 'flex' : 'none';
      });

      generateButton.textContent = ticketType === 'mesa' ? 'Gerar QR Codes' : 'Gerar ingresso individual';
    }

    function setActiveTab(tab) {
      activeTab = tab;
      document.getElementById('tabMesa').classList.toggle('active', tab === 'mesa');
      document.getElementById('tabIndividual').classList.toggle('active', tab === 'individual');
      renderQRCodes();
    }

    function connectSupabase(url, key) {
      const { createClient } = supabase;
      supabaseClient = createClient(url, key);
    }

    async function saveSupabaseConfig() {
      const url = document.getElementById('supabaseUrl').value.trim().replace('/rest/v1/', '').replace('/rest/v1', '');
      const key = document.getElementById('supabaseKey').value.trim();
      const eventName = document.getElementById('eventName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventTime = document.getElementById('eventTime').value;

      if (!url || !key) {
        showMessage('Informe a URL e a Anon Key do Supabase.', 'error');
        return;
      }

      localStorage.setItem('supabase_url', url);
      localStorage.setItem('supabase_key', key);
      localStorage.setItem('event_name', eventName);
      localStorage.setItem('event_date', eventDate);
      localStorage.setItem('event_time', eventTime);

      connectSupabase(url, key);
      showMessage('Configurações salvas. Carregando dados...', 'success');
      await loadCodesFromSupabase();
    }

    async function loadCodesFromSupabase() {
      if (!supabaseClient) {
        showMessage('Conecte o Supabase primeiro.', 'error');
        return;
      }

      const { data, error } = await supabaseClient
        .from('access_codes')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showMessage('Erro ao buscar dados no Supabase: ' + error.message, 'error');
        return;
      }

      allCodes = data || [];
      renderQRCodes();
      updateSummary();
      showMessage('Lista atualizada com dados do Supabase.', 'success');
    }

    function generateUniqueCode(eventName, tableNumber, seatNumber, ticketType) {
      const cleanEvent = eventName
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .replace(/[^a-zA-Z0-9]/g, '')
        .toUpperCase()
        .substring(0, 8) || 'EVENTO';

      const randomPart = Math.random().toString(36).substring(2, 8).toUpperCase();
      const timestamp = Date.now().toString().slice(-6);

      if (ticketType === 'individual') {
        return `${cleanEvent}-IND-${randomPart}${timestamp}`;
      }

      return `${cleanEvent}-M${String(tableNumber).padStart(2, '0')}-L${String(seatNumber).padStart(2, '0')}-${randomPart}${timestamp}`;
    }

    async function generateQRCodes() {
      if (!supabaseClient) {
        showMessage('Conecte o Supabase antes de gerar os QR Codes.', 'error');
        return;
      }

      const ticketType = document.getElementById('ticketType').value;
      const eventName = document.getElementById('eventName').value.trim();
      const eventDate = document.getElementById('eventDate').value;
      const eventTime = document.getElementById('eventTime').value;
      const tableNumber = Number(document.getElementById('tableNumber').value);
      const guestQuantity = ticketType === 'mesa' ? Number(document.getElementById('guestQuantity').value) : 1;
      const customerName = document.getElementById('customerName').value.trim();
      const customerEmail = document.getElementById('customerEmail').value.trim();
      const customerWhatsapp = document.getElementById('customerWhatsapp').value.trim();
      const generateButton = document.getElementById('generateButton');

      if (!eventName) {
        showMessage('Informe o nome do evento nas configurações.', 'error');
        return;
      }

      if (ticketType === 'mesa' && (!tableNumber || tableNumber < 1)) {
        showMessage('Informe um número de mesa válido.', 'error');
        return;
      }

      if (ticketType === 'mesa' && (!guestQuantity || guestQuantity < 1)) {
        showMessage('Informe a quantidade de lugares.', 'error');
        return;
      }

      if (ticketType === 'individual' && !customerName) {
        showMessage('Informe o nome do convidado para ingresso individual.', 'error');
        return;
      }

      generateButton.disabled = true;
      generateButton.textContent = 'Gerando...';

      if (ticketType === 'mesa') {
        const { data: existingTable, error: checkError } = await supabaseClient
          .from('access_codes')
          .select('id')
          .eq('event_name', eventName)
          .eq('ticket_type', 'mesa')
          .eq('table_number', tableNumber)
          .limit(1);

        if (checkError) {
          generateButton.disabled = false;
          toggleTicketType();
          showMessage('Erro ao verificar a mesa: ' + checkError.message, 'error');
          return;
        }

        if (existingTable && existingTable.length > 0) {
          generateButton.disabled = false;
          toggleTicketType();
          showMessage(`A mesa ${tableNumber} deste evento já existe no Supabase.`, 'error');
          return;
        }
      }

      const newCodes = [];

      for (let seat = 1; seat <= guestQuantity; seat++) {
        let code;

        do {
          code = generateUniqueCode(eventName, tableNumber, seat, ticketType);
        } while (allCodes.some(item => item.qr_code === code) || newCodes.some(item => item.qr_code === code));

        newCodes.push({
          event_name: eventName,
          event_date: eventDate,
          event_time: eventTime,
          ticket_type: ticketType,
          customer_name: customerName || null,
          customer_email: customerEmail || null,
          customer_whatsapp: customerWhatsapp || null,
          table_number: ticketType === 'mesa' ? tableNumber : null,
          seat_number: ticketType === 'mesa' ? seat : null,
          qr_code: code,
          status: 'pending',
          accessed: false
        });
      }

      const { error: insertError } = await supabaseClient
        .from('access_codes')
        .insert(newCodes);

      generateButton.disabled = false;
      toggleTicketType();

      if (insertError) {
        showMessage('Erro ao salvar no Supabase: ' + insertError.message, 'error');
        return;
      }

      await loadCodesFromSupabase();
      clearForm(false);
      showMessage(
        ticketType === 'mesa'
          ? `${guestQuantity} QR Codes salvos no Supabase para a mesa ${tableNumber}.`
          : `Ingresso individual gerado para ${customerName}.`,
        'success'
      );
    }

    function renderQRCodes() {
      const container = document.getElementById('qrContainer');
      container.innerHTML = '';

      const filteredCodes = allCodes.filter(item => {
        const type = item.ticket_type || 'mesa';
        return activeTab === 'mesa' ? type === 'mesa' : type === 'individual';
      });

      if (filteredCodes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            ${activeTab === 'mesa' ? 'Nenhum QR Code de mesa encontrado.' : 'Nenhum ingresso individual encontrado.'}
          </div>
        `;
        return;
      }

      const groupedByTable = {};

      filteredCodes.forEach(item => {
        const key = getGroupKey(item);

        if (!groupedByTable[key]) {
          groupedByTable[key] = [];
        }

        groupedByTable[key].push(item);
      });

      Object.keys(groupedByTable).forEach(groupKey => {
        const section = document.createElement('div');
        section.className = 'table-section';

        const title = document.createElement('div');
        title.className = 'table-title';

        const titleText = document.createElement('h2');
        titleText.textContent = groupKey;

        const titleActions = document.createElement('div');
        titleActions.style.display = 'flex';
        titleActions.style.gap = '10px';
        titleActions.style.alignItems = 'center';
        titleActions.style.flexWrap = 'wrap';

        const countText = document.createElement('span');
        countText.textContent = `${groupedByTable[groupKey].length} QR Codes`;

        const tablePdfButton = document.createElement('button');
        tablePdfButton.className = 'btn-primary';
        tablePdfButton.style.padding = '10px 12px';
        tablePdfButton.style.fontSize = '13px';
        tablePdfButton.textContent = activeTab === 'mesa' ? 'Baixar PDF da mesa' : 'Baixar PDF dos ingressos';
        tablePdfButton.onclick = () => sendTableQRCodes(groupKey);

        titleActions.appendChild(countText);
        titleActions.appendChild(tablePdfButton);
        title.appendChild(titleText);
        title.appendChild(titleActions);

        const grid = document.createElement('div');
        grid.className = 'qr-grid';

        groupedByTable[groupKey].forEach(item => {
          const card = document.createElement('div');
          card.className = item.accessed ? 'qr-card used' : 'qr-card';

          if (item.accessed) {
            const usedBadge = document.createElement('div');
            usedBadge.className = 'used-badge';
            usedBadge.textContent = 'JÁ ENTROU';
            card.appendChild(usedBadge);
          }

          const canvas = document.createElement('canvas');
          canvas.id = `canvas-${item.id}`;

          const codeText = document.createElement('div');
          codeText.className = 'qr-code-text';
          codeText.textContent = item.qr_code;

          const info = document.createElement('div');
          info.className = 'qr-info';
          info.innerHTML = getInfoText(item);

          const downloadButton = document.createElement('button');
          downloadButton.className = 'btn-secondary';
          downloadButton.textContent = 'Baixar PDF';
          downloadButton.onclick = () => downloadQRCodePDFAndWhatsApp(item);

          card.appendChild(canvas);
          card.appendChild(codeText);
          card.appendChild(info);
          card.appendChild(downloadButton);
          grid.appendChild(card);

          QRCode.toCanvas(canvas, item.qr_code, {
            width: 180,
            margin: 2,
            errorCorrectionLevel: 'H'
          });
        });

        section.appendChild(title);
        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    function getGroupKey(item) {
      const type = item.ticket_type || 'mesa';

      if (type === 'individual') {
        return `${item.event_name} - Ingressos individuais`;
      }

      return `${item.event_name} - Mesa ${item.table_number}${item.customer_name ? ` - Mesa de ${item.customer_name}` : ''}`;
    }

    function getInfoText(item) {
      const type = item.ticket_type || 'mesa';

      if (type === 'individual') {
        return `${item.customer_name || 'Ingresso individual'}${item.accessed ? ' • ACESSO UTILIZADO' : ''}`;
      }

      const ownerText = item.customer_name ? ` • Mesa de ${item.customer_name}` : '';
      return item.accessed
        ? `Mesa ${item.table_number} • Lugar ${item.seat_number}${ownerText} • ACESSO UTILIZADO`
        : `Mesa ${item.table_number} • Lugar ${item.seat_number}${ownerText}`;
    }

    async function sendTableQRCodes(groupKey) {
      const tableCodes = allCodes.filter(item => getGroupKey(item) === groupKey);

      if (tableCodes.length === 0) {
        showMessage('Nenhum QR Code encontrado para gerar o PDF.', 'error');
        return;
      }

      const firstItem = tableCodes[0];
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [80, 120]
      });

      let addedPages = 0;

      for (let index = 0; index < tableCodes.length; index++) {
        const item = tableCodes[index];
        const canvas = document.getElementById(`canvas-${item.id}`);

        if (!canvas) continue;

        if (addedPages > 0) {
          pdf.addPage([80, 120], 'portrait');
        }

        addedPages++;
        drawTicketPdfPage(pdf, item, canvas);
      }

      if (addedPages === 0) {
        showMessage('Não foi possível encontrar os QR Codes renderizados na tela. Atualize a lista e tente novamente.', 'error');
        return;
      }

      const fileName = (firstItem.ticket_type || 'mesa') === 'individual'
        ? `${firstItem.event_name}-ingressos-individuais.pdf`.replace(/[^a-zA-Z0-9.-]/g, '-')
        : `${firstItem.event_name}-mesa-${firstItem.table_number}-qrcodes.pdf`.replace(/[^a-zA-Z0-9.-]/g, '-');

      await baixarPDFNoCelular(pdf, fileName);
    }

    async function downloadQRCodePDFAndWhatsApp(item) {
      const canvas = document.getElementById(`canvas-${item.id}`);

      if (!canvas) return;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [80, 120]
      });

      drawTicketPdfPage(pdf, item, canvas);

      const fileName = (item.ticket_type || 'mesa') === 'individual'
        ? `${item.event_name}-${item.customer_name || 'ingresso-individual'}.pdf`.replace(/[^a-zA-Z0-9.-]/g, '-')
        : `${item.event_name}-mesa-${item.table_number}-lugar-${item.seat_number}.pdf`.replace(/[^a-zA-Z0-9.-]/g, '-');

      await baixarPDFNoCelular(pdf, fileName);
    }

    function drawTicketPdfPage(pdf, item, canvas) {
      const image = canvas.toDataURL('image/png');
      const hasName = Boolean(item.customer_name);
      const isUsed = Boolean(item.accessed);
      const type = item.ticket_type || 'mesa';

      pdf.setFillColor(isUsed ? 254 : 255, isUsed ? 242 : 255, isUsed ? 242 : 255);
      pdf.rect(0, 0, 80, 120, 'F');

      if (isUsed) {
        pdf.setFillColor(220, 38, 38);
        pdf.roundedRect(17, 4, 46, 8, 2, 2, 'F');
        pdf.setTextColor(255, 255, 255);
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(8);
        pdf.text('JÁ ACESSADO', 40, 9.5, { align: 'center' });
      }

      pdf.setTextColor(17, 24, 39);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(13);
      pdf.text(item.event_name || 'Evento', 40, isUsed ? 18 : 10, { align: 'center' });

      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(9);

      if (item.event_date) {
        pdf.text(`Data: ${formatDateBR(item.event_date)}`, 40, isUsed ? 24 : 16, { align: 'center' });
      }

      if (item.event_time) {
        pdf.text(`Hora: ${item.event_time}`, 40, isUsed ? 29 : 21, { align: 'center' });
      }

      if (hasName) {
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(9);
        pdf.text(
          type === 'mesa' ? `Mesa de ${item.customer_name}` : item.customer_name,
          40,
          isUsed ? 33 : 25,
          { align: 'center' }
        );
      }

      const qrY = hasName ? (isUsed ? 38 : 30) : (isUsed ? 34 : 26);
      const boxY = hasName ? (isUsed ? 88 : 82) : (isUsed ? 86 : 80);
      const textY = hasName ? (isUsed ? 94 : 88) : (isUsed ? 92 : 86);
      const footerY = hasName ? (isUsed ? 111 : 106) : (isUsed ? 109 : 104);

      pdf.addImage(image, 'PNG', 17, qrY, 46, 46);

      pdf.setFillColor(243, 244, 246);
      pdf.roundedRect(8, boxY, 64, 16, 3, 3, 'F');

      pdf.setTextColor(17, 24, 39);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(10);

      const codeLines = pdf.splitTextToSize(item.qr_code, 58);
      pdf.text(codeLines, 40, textY, { align: 'center' });

      pdf.setTextColor(107, 114, 128);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(10);

      const footerText = type === 'individual'
        ? `${item.customer_name || 'Ingresso individual'}${isUsed ? ' • JÁ ENTROU' : ''}`
        : isUsed
          ? `Mesa ${item.table_number} • Lugar ${item.seat_number} • JÁ ENTROU`
          : `Mesa ${item.table_number} • Lugar ${item.seat_number}`;

      pdf.text(footerText, 40, footerY, { align: 'center' });
    }

    async function baixarPDFNoCelular(pdf, fileName) {
      const pdfBlob = pdf.output('blob');
      const pdfFile = new File([pdfBlob], fileName, { type: 'application/pdf' });

      if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
        try {
          await navigator.share({
            files: [pdfFile],
            title: fileName,
            text: ''
          });
          showMessage('PDF pronto para compartilhar.', 'success');
          return;
        } catch (error) {
          if (error.name === 'AbortError') return;
        }
      }

      const pdfUrl = URL.createObjectURL(pdfBlob);
      const link = document.createElement('a');
      link.href = pdfUrl;
      link.download = fileName;
      link.style.display = 'none';
      link.rel = 'noopener';

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      setTimeout(() => {
        URL.revokeObjectURL(pdfUrl);
      }, 3000);

      showMessage('PDF baixado. Agora compartilhe o arquivo pela galeria/arquivos do celular.', 'success');
    }

    function downloadQRCode(id, code) {
      const canvas = document.getElementById(`canvas-${id}`);

      if (!canvas) return;

      const image = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.href = image;
      link.download = `${code}.png`;
      link.click();
    }

    function downloadAllQRCodes() {
      if (allCodes.length === 0) {
        showMessage('Nenhum QR Code para baixar.', 'error');
        return;
      }

      allCodes.forEach((item, index) => {
        setTimeout(() => {
          downloadQRCode(item.id, item.qr_code);
        }, index * 300);
      });

      showMessage('Download dos QR Codes iniciado.', 'success');
    }

    function clearForm(clearEvent = true) {
      if (clearEvent) {
        document.getElementById('eventName').value = '';
      }

      document.getElementById('customerName').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('customerWhatsapp').value = '';
      document.getElementById('tableNumber').value = '';
      document.getElementById('guestQuantity').value = '';
    }

    function updateSummary() {
      const mesaCodes = allCodes.filter(item => (item.ticket_type || 'mesa') === 'mesa');
      const individualCodes = allCodes.filter(item => (item.ticket_type || 'mesa') === 'individual');
      const uniqueTables = new Set(mesaCodes.map(item => `${item.event_name}-${item.table_number}`));

      document.getElementById('totalTables').textContent = uniqueTables.size;
      document.getElementById('totalCodes').textContent = mesaCodes.length;
      document.getElementById('totalIndividual').textContent = individualCodes.length;
    }

    function formatDateBR(dateString) {
      if (!dateString) return '';

      const parts = String(dateString).split('-');

      if (parts.length !== 3) {
        return dateString;
      }

      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;

      setTimeout(() => {
        message.className = 'message';
        message.textContent = '';
      }, 5000);
    }
  </script>
</body>
</html>
